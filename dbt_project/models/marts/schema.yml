version: 2

models:
  - name: dim_patients
    description: >
      Central patient dimension. One row per patient with demographics,
      chronic condition flags, and most recent key lab values.
      Condition flags are precomputed — no need to join conditions for basic counts.
    columns:
      - name: patient_id
        description: Unique patient identifier
        tests:
          - not_null
          - unique
      - name: has_diabetes
        description: 1 if patient has active Type 2 diabetes (ICD-10 E11.*), 0 otherwise.
        tests:
          - not_null
      - name: has_hypertension
        description: 1 if patient has active essential hypertension (ICD-10 I10), 0 otherwise.
        tests:
          - not_null
      - name: latest_a1c_value
        description: >
          Most recent A1c value in percent. NULL if never recorded.
          Normal below 5.7%. Prediabetes 5.7-6.4%. Diabetes 6.5%+.

  - name: fact_encounters
    description: >
      One row per clinical encounter with visit type, timing, cost, and primary diagnosis.
      Filter by encounter_class for specific visit types.
    columns:
      - name: encounter_id
        description: Unique encounter identifier
        tests:
          - not_null
          - unique
      - name: encounter_class
        description: "Type of visit: ambulatory, emergency, inpatient, wellness, urgentcare, outpatient, hospice, snf."
        tests:
          - not_null

  - name: fact_lab_results
    description: >
      Laboratory results with abnormality flags based on clinical reference ranges.
      Use is_abnormal = true to find out-of-range values.
    columns:
      - name: is_abnormal
        description: >
          True if value is outside the clinical reference range for this LOINC code.
          NULL if no reference range is defined.

  # - name: fact_medications
  #   description: >
  #     Medication records with drug class classification.
  #     Use is_active = true for currently prescribed medications.

  - name: fact_medications
    description: >
      Medication records enriched with patient demographics, chronic-condition
      indicators, active prescription status, and mapped medication classes.
      Use is_active = true for currently prescribed medications.
    columns:
      - name: patient_id
        description: Unique patient identifier.

      - name: encounter_id
        description: Encounter associated with the medication record.

      - name: rxnorm_code
        description: RxNorm medication code.

      - name: medication_name
        description: Medication description from the source record.

      - name: drug_classes
        description: >
          Medication class or comma-separated class combination derived from
          the drug-class mapping table. This field may be NULL when no class
          mapping is available. Exclude NULL and blank values when grouping
          medication classes.

      - name: start_date
        description: Date the medication was started.

      - name: stop_date
        description: Date the medication was stopped, when available.

      - name: is_active
        description: True when the medication does not have a recorded stop date.

      - name: duration_days
        description: Calculated medication duration in days.

      - name: age_at_generation
        description: Patient age at dataset generation.

      - name: gender
        description: Patient gender.

      - name: race
        description: Patient race.

      - name: ethnicity
        description: Patient ethnicity.

      - name: has_diabetes
        description: Binary indicator for diabetes.

      - name: has_hypertension
        description: Binary indicator for hypertension.

      - name: has_copd
        description: Binary indicator for COPD.

      - name: has_heart_failure
        description: Binary indicator for heart failure.

      - name: has_ckd
        description: Binary indicator for chronic kidney disease.

      - name: has_asthma
        description: Binary indicator for asthma.