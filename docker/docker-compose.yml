version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: cliniq_postgres
    environment:
      POSTGRES_USER: cliniq
      POSTGRES_PASSWORD: cliniq_pass
      POSTGRES_DB: cliniq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniq"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: python:3.11-slim
    container_name: cliniq_mlflow
    command: >
      bash -c "pip install mlflow && mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow_artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow_artifacts

  ollama:
    image: ollama/ollama:latest
    container_name: cliniq_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  mlflow_data:
  ollama_data: