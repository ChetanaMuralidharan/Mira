version: '3.8'

x-airflow-common: &airflow-common
  build:
    context: ..
    dockerfile: docker/Dockerfile.airflow
  environment:
    - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow_postgres/airflow
    - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
    - AIRFLOW__CORE__LOAD_EXAMPLES=false
    - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth
    - CLINIQ_PARQUET_DIR=/opt/cliniq/data/parquet/raw
    - AIRFLOW__CORE__DAGS_FOLDER=/opt/cliniq/airflow_dags
  volumes:
    - ../:/opt/cliniq
    - airflow_logs:/opt/airflow/logs
  depends_on:
    airflow_postgres:
      condition: service_healthy

services:

  postgres:
    image: pgvector/pgvector:pg15
    container_name: cliniq_postgres
    environment:
      POSTGRES_USER: cliniq
      POSTGRES_PASSWORD: cliniq_pass
      POSTGRES_DB: cliniq_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cliniq"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow_postgres:
    image: postgres:15
    container_name: cliniq_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    container_name: cliniq_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@cliniq.local \
          --password admin
    restart: "no"
    depends_on:
      airflow_postgres:
        condition: service_healthy

  airflow-webserver:
    <<: *airflow-common
    container_name: cliniq_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    container_name: cliniq_airflow_scheduler
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.4
    container_name: mira_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow_tracking:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  postgres_data:
  airflow_postgres_data:
  airflow_logs: